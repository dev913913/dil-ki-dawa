<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>दिल की दवा — Dil Ki Dawa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Serif+Devanagari:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0e0a06;
  --bg2: #161008;
  --panel: #1c1409;
  --panel2: #221a0d;
  --gold: #C8922A;
  --gold2: #E8B84B;
  --gold3: #F5D58A;
  --amber: #8B5E1A;
  --cream: #F0E6D0;
  --muted: rgba(240,230,208,0.45);
  --border: rgba(200,146,42,0.2);
  --border2: rgba(200,146,42,0.5);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Warm vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(200,146,42,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(139,94,26,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Film grain texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 56px 0 40px;
  animation: fadeUp 0.8s ease both;
}

.hindi-title {
  font-family: 'Noto Serif Devanagari', serif;
  font-size: clamp(38px, 8vw, 58px);
  font-weight: 600;
  color: var(--gold2);
  line-height: 1.1;
  text-shadow: 0 0 40px rgba(200,146,42,0.35), 0 2px 4px rgba(0,0,0,0.5);
  letter-spacing: 2px;
}

.english-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(13px, 3vw, 17px);
  font-style: italic;
  color: var(--muted);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-top: 6px;
}

.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px 0 0;
}

.div-line {
  flex: 1;
  max-width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

.div-diamond {
  width: 6px; height: 6px;
  background: var(--gold2);
  transform: rotate(45deg);
  opacity: 0.6;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: rgba(240,230,208,0.35);
  margin-top: 14px;
  letter-spacing: 0.5px;
  line-height: 1.6;
}

/* ── MOOD CATEGORY ── */
.mood-section {
  margin-top: 36px;
  animation: fadeUp 0.8s 0.1s ease both;
}

.section-label {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: rgba(200,146,42,0.5);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.mood-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.mood-chip {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  font-weight: 400;
  padding: 7px 16px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  letter-spacing: 0.3px;
}

.mood-chip:hover {
  border-color: var(--gold);
  color: var(--gold2);
  background: rgba(200,146,42,0.06);
}

.mood-chip.selected {
  border-color: var(--gold2);
  color: var(--gold2);
  background: rgba(200,146,42,0.1);
  box-shadow: 0 0 12px rgba(200,146,42,0.1);
}

/* ── INPUT ── */
.input-section {
  margin-top: 28px;
  animation: fadeUp 0.8s 0.18s ease both;
}

.input-label {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 15px;
  color: rgba(240,230,208,0.5);
  margin-bottom: 10px;
  display: block;
  letter-spacing: 0.3px;
}

textarea {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 2px solid rgba(200,146,42,0.3);
  color: var(--cream);
  font-family: 'Lato', sans-serif;
  font-size: 15px;
  font-weight: 300;
  padding: 18px 20px;
  resize: none;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
  line-height: 1.8;
  border-radius: 0;
  letter-spacing: 0.3px;
}

textarea::placeholder {
  color: rgba(240,230,208,0.2);
  font-style: italic;
}

textarea:focus {
  border-color: rgba(200,146,42,0.5);
  box-shadow: 0 0 0 1px rgba(200,146,42,0.15), 0 4px 20px rgba(200,146,42,0.05);
}

/* ── BUTTON ── */
.btn-row {
  display: flex;
  gap: 3px;
  margin-top: 3px;
}

button.submit {
  flex: 1;
  background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 100%);
  color: #0e0a06;
  border: none;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 16px 24px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(200,146,42,0.25);
  position: relative;
  overflow: hidden;
}

button.submit::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition: left 0.5s;
}

button.submit:hover::after { left: 150%; }
button.submit:hover { box-shadow: 0 6px 28px rgba(200,146,42,0.4); transform: translateY(-1px); }
button.submit:active { transform: translateY(1px); }
button.submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

button.clear-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.2s;
}

button.clear-btn:hover { border-color: var(--gold); color: var(--gold2); }

/* ── RESPONSE / SONG CARD ── */
.song-section {
  margin-top: 32px;
  animation: fadeUp 0.8s 0.24s ease both;
}

.song-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top: 2px solid var(--gold);
  padding: 28px 28px 24px;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: box-shadow 0.3s;
}

.song-card.active {
  box-shadow: 0 0 40px rgba(200,146,42,0.1);
}

/* Corner marks */
.cm {
  position: absolute;
  width: 10px; height: 10px;
  border-color: rgba(200,146,42,0.35);
  border-style: solid;
}
.cm.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
.cm.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
.cm.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
.cm.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

.placeholder {
  text-align: center;
}

.placeholder-symbol {
  font-size: 32px;
  opacity: 0.15;
  display: block;
  margin-bottom: 8px;
}

.placeholder-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(240,230,208,0.2);
  letter-spacing: 1px;
}

/* Loading */
.loading { display: none; flex-direction: column; align-items: center; gap: 12px; }
.loading.on { display: flex; }

.vinyl {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: conic-gradient(
    #2a1e0a 0deg, #1a1208 30deg,
    #2a1e0a 60deg, #1a1208 90deg,
    #2a1e0a 120deg, #1a1208 150deg,
    #2a1e0a 180deg, #1a1208 210deg,
    #2a1e0a 240deg, #1a1208 270deg,
    #2a1e0a 300deg, #1a1208 330deg,
    #2a1e0a 360deg
  );
  border: 2px solid rgba(200,146,42,0.3);
  animation: spin 1.5s linear infinite;
  position: relative;
}

.vinyl::after {
  content: '';
  position: absolute;
  inset: 30%;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
}

.loading-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(200,146,42,0.6);
  letter-spacing: 2px;
  animation: flicker 2s ease infinite;
}

/* Song info */
.song-info { display: none; width: 100%; }
.song-info.on { display: block; animation: fadeUp 0.5s ease both; }

.song-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 700;
  color: var(--gold2);
  line-height: 1.2;
  margin-bottom: 6px;
}

.song-meta {
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.song-meta span {
  color: rgba(200,146,42,0.6);
  margin: 0 6px;
}

.song-why {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(240,230,208,0.35);
  margin: 12px 0 20px;
  line-height: 1.6;
  border-left: 2px solid rgba(200,146,42,0.2);
  padding-left: 12px;
}

/* YouTube embed */
.yt-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  background: #000;
  margin-top: 4px;
  border: 1px solid rgba(200,146,42,0.15);
}

.yt-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.yt-fallback {
  display: none;
  margin-top: 16px;
}

.yt-fallback.on { display: block; }

.yt-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,146,42,0.08);
  border: 1px solid var(--border2);
  color: var(--gold2);
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 12px 20px;
  text-decoration: none;
  transition: all 0.2s;
}

.yt-link:hover { background: rgba(200,146,42,0.14); }

/* ── FOOTER ── */
.footer {
  margin-top: 56px;
  text-align: center;
  animation: fadeUp 0.8s 0.4s ease both;
}

.footer-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}

.footer-quote {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(200,146,42,0.25);
  letter-spacing: 1px;
  line-height: 1.7;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ── MOBILE ── */
@media (max-width: 500px) {
  .hindi-title { font-size: 38px; }
  .btn-row { flex-direction: column; }
  button.clear-btn { padding: 12px; }
  .song-card { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="hindi-title">दिल की दवा</div>
    <div class="english-title">Dil Ki Dawa · Medicine for the Heart</div>
    <div class="divider-ornament">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line"></div>
    </div>
    <div class="tagline">
      Tell me what weighs on your heart.<br/>
      An old song will find you.
    </div>
  </header>

  <!-- MOOD CATEGORY -->
  <div class="mood-section">
    <div class="section-label">◆ Your mood</div>
    <div class="mood-chips">
      <button class="mood-chip" onclick="selectMood(this, '💔 Heartbroken')">💔 Heartbroken</button>
      <button class="mood-chip" onclick="selectMood(this, '😔 Feeling low')">😔 Feeling low</button>
      <button class="mood-chip" onclick="selectMood(this, '😤 Frustrated')">😤 Frustrated</button>
      <button class="mood-chip" onclick="selectMood(this, '😰 Anxious')">😰 Anxious</button>
      <button class="mood-chip" onclick="selectMood(this, '🥺 Missing someone')">🥺 Missing someone</button>
      <button class="mood-chip" onclick="selectMood(this, '😶 Numb / Empty')">😶 Numb</button>
      <button class="mood-chip" onclick="selectMood(this, '🤔 Lost / Confused')">🤔 Lost</button>
      <button class="mood-chip" onclick="selectMood(this, '😌 Need peace')">😌 Need peace</button>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <label class="input-label" for="userInput">Tell me what's on your mind...</label>
    <textarea
      id="userInput"
      rows="4"
      placeholder="Share what you're feeling, or what's troubling you... even a few words are enough."
      maxlength="600"
    ></textarea>
    <div class="btn-row">
      <button class="submit" id="submitBtn" onclick="findSong()">✦ Find My Song</button>
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- SONG CARD -->
  <div class="song-section">
    <div class="section-label">◆ Your song</div>
    <div class="song-card" id="songCard">
      <div class="cm tl"></div><div class="cm tr"></div>
      <div class="cm bl"></div><div class="cm br"></div>

      <div class="placeholder" id="placeholder">
        <span class="placeholder-symbol">♪</span>
        <div class="placeholder-text">Your song awaits...</div>
      </div>

      <div class="loading" id="loading">
        <div class="vinyl"></div>
        <div class="loading-text">Searching the golden era...</div>
      </div>

      <div class="song-info" id="songInfo">
        <div class="song-name" id="songName"></div>
        <div class="song-meta" id="songMeta"></div>
        <div class="song-why" id="songWhy"></div>
        <div class="yt-wrap" id="ytEmbed"></div>
        <div class="yt-fallback" id="ytFallback">
          <a class="yt-link" id="ytLink" href="#" target="_blank" rel="noopener">
            ▶ Listen on YouTube
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-ornament">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line"></div>
    </div>
    <div class="footer-quote">
      "Jo dil mein hai woh gaana ban jaata hai"<br/>
      What lives in the heart becomes a song.
    </div>
  </div>

</div>

<script>
  let selectedMoods = [];
  let recentSongs = [];

  function selectMood(el, mood) {
  el.classList.toggle('selected');
  selectedMoods = [...document.querySelectorAll('.mood-chip.selected')]
    .map(c => c.textContent.trim());
  }

  async function findSong() {
    const input = document.getElementById('userInput').value.trim();
    if (!input && !selectedMoods.length) {
      alert("Please share what you're feeling or select a mood first.");
      return;
    }

    const moodSummary = selectedMoods.length ? selectedMoods.join(' + ') : 'Feeling low';
    const mood = input
      ? (selectedMoods.length ? `${input}\nSelected moods: ${moodSummary}` : input)
      : moodSummary;

    const btn        = document.getElementById('submitBtn');
    const placeholder = document.getElementById('placeholder');
    const loading    = document.getElementById('loading');
    const songInfo   = document.getElementById('songInfo');
    const songCard   = document.getElementById('songCard');

    btn.disabled = true;
    placeholder.style.display = 'none';
    songInfo.classList.remove('on');
    loading.classList.add('on');
    songCard.classList.add('active');

    try {
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mood,
          selectedMoods,
          userText: input,
          avoidSongs: recentSongs.slice(-5)
        })
      });

      const data = await res.json();
      console.log("⚡ Source:", data.source);

      if (data.song) {
        showSong(data.song);
      } else {
        showError("The music finder couldn't find a song right now. Please try again.");
      }

    } catch (err) {
      showError("Something went wrong. Please check your connection and try again.");
      console.error(err);
    }

    loading.classList.remove('on');
    btn.disabled = false;
  }

  function showSong(song) {
    document.getElementById('songName').textContent = song.song || '';
    document.getElementById('songMeta').innerHTML =
      `${song.singer || ''}<span>·</span>${song.film || ''}<span>·</span>${song.year || ''}`;
    document.getElementById('songWhy').textContent = song.why || '';
    if (song.song) recentSongs.push(song.song);

    // YouTube embed using search query
    const searchText = song.searchQuery || `${song.song} ${song.singer}`;
    const query = encodeURIComponent(searchText);
    const ytWrap = document.getElementById('ytEmbed');
    const ytFallback = document.getElementById('ytFallback');
    const ytLink = document.getElementById('ytLink');
    const ytSearchUrl = `https://www.youtube.com/results?search_query=${query}`;
    const ytWatchUrl = song.youtube?.watchUrl || ytSearchUrl;
    const ytEmbedUrl = song.youtube?.embedUrl || `https://www.youtube.com/embed?listType=search&list=${query}`;

    // Prefer a verified embeddable video from backend. Fallback to YouTube search embed.
    ytWrap.innerHTML = `<iframe
      src="${ytEmbedUrl}"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>`;

    // Always show YouTube link as fallback
    ytLink.href = ytWatchUrl;
    ytFallback.classList.add('on');

    document.getElementById('songInfo').classList.add('on');
  }

  function showError(msg) {
    document.getElementById('placeholder').style.display = 'block';
    document.getElementById('placeholder').querySelector('.placeholder-text').textContent = msg;
  }

  function clearAll() {
    document.getElementById('userInput').value = '';
    document.getElementById('placeholder').style.display = 'block';
    document.getElementById('placeholder').querySelector('.placeholder-text').textContent = 'Your song awaits...';
    document.getElementById('songInfo').classList.remove('on');
    document.getElementById('loading').classList.remove('on');
    document.getElementById('songCard').classList.remove('active');
    document.getElementById('ytEmbed').innerHTML = '';
    document.getElementById('ytFallback').classList.remove('on');
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
    selectedMoods = [];
    recentSongs = [];
  }

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) findSong();
  });
</script>
</body>
</html>
